name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 1
  CARGO_TARGET_DIR: target-valence
  # Smaller target dirs on the ~14GB GitHub-hosted disk.
  CARGO_INCREMENTAL: "0"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - name: Gate script
        run: bash scripts/gate.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -A missing-docs
      - name: Deny rustc warnings (isolated crates)
        # Workspace feature unification can hide dead_code that only appears on
        # single-crate builds (cargo publish / package verify). Match that surface.
        run: |
          export RUSTFLAGS="-D warnings"
          for pkg in \
            uf-valence-core \
            uf-valence-schema-dsl \
            uf-valence-telemetry \
            uf-valence-macros \
            uf-valence-backend-sql \
            uf-valence-backend-mem \
            uf-valence-codegen \
            uf-valence
          do
            echo "==> cargo check -p $pkg"
            cargo check -p "$pkg"
          done
          echo "==> uf-valence-core feature slices"
          cargo check -p uf-valence-core --no-default-features --features instrumentation
          cargo check -p uf-valence-core --no-default-features --features instrumentation,compiler-sql
          cargo check -p uf-valence-core --no-default-features --features instrumentation,compiler-surreal
          cargo check -p uf-valence-core --no-default-features --features instrumentation,compiler-mongodb
          cargo check -p uf-valence-core --no-default-features --features instrumentation,compiler-redis
          cargo check -p uf-valence-core --no-default-features --features instrumentation,compiler-indradb
      - name: Reclaim disk after clippy
        run: |
          # Clippy and tests share CARGO_TARGET_DIR; drop intermediates before the full test build.
          rm -rf "${CARGO_TARGET_DIR}/debug/incremental" \
                 "${CARGO_TARGET_DIR}/debug/examples" \
                 "${CARGO_TARGET_DIR}/debug/build" \
                 "${CARGO_TARGET_DIR}/tmp" || true
          df -h
      - name: Rustdoc
        run: |
          # Facade docs need --all-features so backend re-exports resolve in Getting started.
          RUSTDOCFLAGS="-D warnings" cargo doc -p uf-valence --all-features --no-deps
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --exclude uf-valence --no-deps
      - name: Doctests
        run: |
          cargo test --doc -p uf-valence-core -p uf-valence-backend-mem -p uf-valence-telemetry -p uf-valence
      - name: Test workspace
        # Process-global telemetry/deletion harness state requires serial tests.
        run: cargo test --workspace -- --test-threads=1
      - name: Dependency hygiene
        run: |
          cargo install cargo-machete --locked --quiet
          cargo machete

  package-dry-run:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Package leaf crates (no unpublished uf-* deps)
        run: |
          # Interdependent crates need leaves on crates.io before `cargo package` can
          # resolve versioned path deps. Until the first publish wave, only package leaves.
          cargo package -p uf-valence-schema-dsl --allow-dirty --no-verify
          cargo package -p uf-valence-telemetry --allow-dirty --no-verify
      - name: Verify publishable crate metadata
        run: bash scripts/check-publish-metadata.sh
      - name: cargo publish --dry-run leaf crates
        run: |
          cargo publish -p uf-valence-schema-dsl --dry-run --allow-dirty
          cargo publish -p uf-valence-telemetry --dry-run --allow-dirty

  examples:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Runnable embedded examples
        run: |
          cargo run -p uf-valence --example quickstart --features mem
          cargo run -p uf-valence --example multi_backend --features mem
          cargo run -p uf-valence --example quickstart_sqlite --features sqlite
          cargo run -p uf-valence --example quickstart_indradb --features indradb
          cargo run -p uf-valence --example surreal_embedded --features surreal
          cargo run -p uf-valence --example quickstart_telemetry --features mem,telemetry-console
      # Non-gating smoke: examples exit 0 when DATABASE_URL / VALENCE_* URI unset (soft-skip).
      # Live wire DBs are not provisioned in PR CI — green here does not mean postgres/mongo/redis coverage.
      - name: Wire examples (skip when URL unset)
        run: |
          cargo run -p uf-valence --example quickstart_postgres --features postgres
          cargo run -p uf-valence --example quickstart_mongodb --features mongodb
          cargo run -p uf-valence --example quickstart_redis --features redis

  e2e:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: valence-e2e matrix catalog
        run: cargo test -p valence-e2e --test matrix_catalog -- --test-threads=1
      - name: valence-e2e admin runtime catalog
        run: cargo test -p valence-e2e --test admin_runtime_catalog -- --test-threads=1
      - name: valence-e2e model runtime catalog
        run: cargo test -p valence-e2e --test model_runtime_catalog -- --test-threads=1

  # Non-gating smoke: continue-on-error so coverage tooling failures do not block merge.
  # Report is informational only (mem/surreal-mem tier); not a release gate.
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov
      - name: Line coverage report (workspace, mem tier)
        run: |
          cargo llvm-cov --workspace \
            --exclude valence-e2e --exclude valence-bench \
            --features mem,surreal-mem \
            --summary-only
          cargo llvm-cov --workspace \
            --exclude valence-e2e --exclude valence-bench \
            --features mem,surreal-mem \
            --lcov --output-path lcov.info
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-lcov
          path: lcov.info

  bench-smoke:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: bm-v0 smoke run
        run: |
          out=$(cargo run -p valence-bench -- run \
            --experiment bm-v0 --storage mem --telemetry off \
            --topology embedded --ops 100)
          echo "$out"
          echo "$out" | grep -q '"status": "ok"'

  codegen-runtime:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Gate script
        run: bash scripts/gate.sh
      - name: Codegen / runtime verify
        run: |
          cargo test -p uf-valence-core -- --test-threads=1
          cargo test -p uf-valence-codegen -- --test-threads=1
          # Process-global telemetry/deletion harness state requires serial tests.
          cargo test -p valence-testkit -- --test-threads=1
          cargo test -p valence-e2e --test admin_runtime_catalog -- --test-threads=1
          cargo test -p codegen-host --test compile_generated_models -- --test-threads=1
          cargo test -p product-model-host --test model_contract -- --test-threads=1
          cargo check -p codegen-host -p product-model-host -p admin-runtime-host
      - name: Routing invariants
        run: |
          # Match scripts/gate.sh: no surrealdb crate dep/import in core (engine slug string is OK).
          ! rg 'surrealdb' valence-core/Cargo.toml
          ! rg 'use surrealdb|surrealdb::' valence-core/src/
          ! rg 'leptos|valence-platform|higgs|nucleus' --glob 'Cargo.toml' .

  core-skeleton:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Free disk space
        run: bash scripts/ci-free-disk.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Gate script
        run: bash scripts/gate.sh
      - name: Test core crates
        run: |
          cargo test -p uf-valence-core -p uf-valence-telemetry -p uf-valence-macros -p uf-valence-backend-mem
      - name: Check facade
        run: |
          cargo check -p uf-valence --no-default-features
          cargo check -p uf-valence --features mem,telemetry-console
      - name: Minimal schema compile check
        run: cargo check -p minimal-schema
