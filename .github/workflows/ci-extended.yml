name: CI Extended E2E

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 1
  CARGO_TARGET_DIR: target-valence
  RUST_BACKTRACE: 1
  VALENCE_BENCH_ROCKSDB: "1"

jobs:
  e2e-extended:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: valence-e2e default matrix
        run: cargo test -p valence-e2e
      - name: valence-e2e surreal-rocksdb matrix
        run: cargo test -p valence-e2e --features surreal-rocksdb -- --ignored
      - name: valence-backend-surreal rocksdb persistence
        run: cargo test -p uf-valence-backend-surreal --features embedded-rocksdb --test rocksdb_persistence -- --test-threads=1
      - name: valence-backend-surreal contract (mem)
        run: cargo test -p uf-valence-backend-surreal --features embedded-mem --test backend_contract -- --test-threads=1
